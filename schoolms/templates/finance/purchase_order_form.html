{% extends "base.html" %}
{% block title %}New Purchase Order · MastexEDU{% endblock %}
{% block page_title %}New Purchase Order{% endblock %}
{% block content %}
<div class="card" style="max-width:520px;">
    <div class="card-header"><h3 class="card-title">{{ action|default:"Create" }} Purchase Order</h3></div>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Supplier Name *</label>
            <input type="text" name="supplier_name" class="form-control" required>
        </div>
        <div class="form-group">
            <label class="form-label">Supplier Contact / Email</label>
            <input type="text" name="supplier_contact" class="form-control">
        </div>
        <div class="form-group">
            <label class="form-label">Notes</label>
            <textarea name="notes" class="form-control" rows="3"></textarea>
        </div>
        <div class="button-row">
            <button type="submit" class="btn btn-primary">Create PO</button>
            <a href="{% url 'finance:purchase_order_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
