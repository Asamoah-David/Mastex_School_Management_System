{% extends "base.html" %}
{% block title %}Add Bank Account · MastexEDU{% endblock %}
{% block page_title %}Add Bank Account{% endblock %}
{% block content %}
<div class="card" style="max-width:520px;">
    <div class="card-header"><h3 class="card-title">New Bank Account</h3></div>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Bank Name *</label>
            <input type="text" name="bank_name" class="form-control" required>
        </div>
        <div class="form-group">
            <label class="form-label">Account Number *</label>
            <input type="text" name="account_number" class="form-control" required>
        </div>
        <div class="form-group">
            <label class="form-label">Account Name (as on bank)</label>
            <input type="text" name="account_name" class="form-control">
        </div>
        <div class="form-group">
            <label class="form-label">Account Type</label>
            <select name="account_type" class="form-control">
                {% for val, label in account_types %}
                <option value="{{ val }}">{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Currency</label>
            <input type="text" name="currency" class="form-control" value="GHS" maxlength="3">
        </div>
        <div class="form-group">
            <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;">
                <input type="checkbox" name="is_primary"> Set as primary account
            </label>
        </div>
        <div class="button-row">
            <button type="submit" class="btn btn-primary">Add Account</button>
            <a href="{% url 'finance:bank_account_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
