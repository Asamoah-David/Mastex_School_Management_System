{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>{% if quiz %}Edit Quiz{% else %}Create Quiz{% endif %}</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label>Title</label>
            <input type="text" name="title" class="form-control" required value="{% if quiz %}{{ quiz.title }}{% endif %}">
        </div>
        <div class="mb-3">
            <label>Description</label>
            <textarea name="description" class="form-control" rows="3">{% if quiz %}{{ quiz.description }}{% endif %}</textarea>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Subject</label>
                <select name="subject" class="form-control searchable-select" data-placeholder="Search for a subject..." required>
                    {% for subject in subjects %}
                    <option value="{{ subject.id }}" {% if quiz and quiz.subject_id == subject.id %}selected{% endif %}>{{ subject.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label>Term</label>
                <select name="term" class="form-control">
                    <option value="">-- Select Term --</option>
                    {% for term in terms %}
                    <option value="{{ term.id }}" {% if quiz and quiz.term_id == term.id %}selected{% endif %}>{{ term.name }}{% if term.is_current %} (Current){% endif %}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="row">
            <div class="col-md-4 mb-3">
                <label>Class</label>
                <select name="class_name" class="form-control searchable-select" data-placeholder="Search for a class..." required>
                    {% for class in classes %}
                    <option value="{{ class }}" {% if quiz and quiz.class_name == class %}selected{% endif %}>{{ class }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4 mb-3">
                <label>Duration (minutes)</label>
                <input type="number" name="duration_minutes" value="{% if quiz %}{{ quiz.duration_minutes }}{% else %}30{% endif %}" class="form-control" required min="1">
            </div>
            <div class="col-md-4 mb-3">
                <label>Passing score (%)</label>
                <input type="number" name="passing_score" value="{% if quiz %}{{ quiz.passing_score }}{% else %}50{% endif %}" class="form-control" required min="0" max="100">
            </div>
        </div>
        <div class="row">
            <div class="col-md-4 mb-3">
                <label>Max attempts per student</label>
                <input type="number" name="max_attempts_per_student" value="{% if quiz %}{{ quiz.max_attempts_per_student }}{% else %}1{% endif %}" class="form-control" required min="1" max="50">
                <small class="text-muted">Quiz total marks are the sum of question marks; score is shown as %.</small>
            </div>
            {% if quiz %}
            <div class="col-md-4 mb-3 d-flex align-items-end">
                <div class="form-check">
                    <input type="checkbox" name="is_active" class="form-check-input" id="is_active" {% if quiz.is_active %}checked{% endif %}>
                    <label class="form-check-label" for="is_active">Quiz active (visible to class)</label>
                </div>
            </div>
            {% endif %}
        </div>
        <button type="submit" class="btn btn-primary">{% if quiz %}Save{% else %}Create Quiz{% endif %}</button>
        <a href="{% url 'academics:quiz_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
