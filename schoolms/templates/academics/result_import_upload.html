{% extends "base.html" %}
{% block title %}Import Results · Step 1{% endblock %}
{% block page_title %}Import Results from CSV/Excel{% endblock %}
{% block page_subtitle %}Step 1 of 4 — Upload File{% endblock %}
{% block content %}
<div class="content-card" style="max-width:600px;">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group" style="margin-bottom:1rem;">
            <label style="font-weight:600;">File (CSV or Excel) *</label>
            <input type="file" name="file" accept=".csv,.xlsx,.xls" required style="display:block;margin-top:.25rem;">
        </div>
        <div class="content-grid" style="grid-template-columns:1fr 1fr;gap:.75rem;">
            <div class="form-group">
                <label>Class *</label>
                <select name="class_name" required class="form-input">
                    <option value="">— Select —</option>
                    {% for c in classes %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Subject *</label>
                <select name="subject" required class="form-input">
                    <option value="">— Select —</option>
                    {% for s in subjects %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Exam Type *</label>
                <select name="exam_type" required class="form-input">
                    <option value="">— Select —</option>
                    {% for e in exam_types %}<option value="{{ e.id }}">{{ e.name }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Term *</label>
                <select name="term" required class="form-input">
                    <option value="">— Select —</option>
                    {% for t in terms %}<option value="{{ t.id }}" {% if current_term_id == t.id|stringformat:"s" %}selected{% endif %}>{{ t.name }}{% if t.is_current %} (current){% endif %}</option>{% endfor %}
                </select>
            </div>
        </div>
        <div class="button-row" style="margin-top:1rem;">
            <button type="submit" class="btn btn-primary">Upload &amp; Continue</button>
            <a href="{% url 'academics:result_upload' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
<style>.form-input{width:100%;padding:.5rem .6rem;border-radius:.5rem;border:1px solid rgba(148,163,184,.5);background:rgba(15,23,42,.9);color:var(--text-main);}.form-group{margin-bottom:.75rem;}.form-group label{display:block;font-size:.8rem;color:var(--text-soft);margin-bottom:.25rem;}</style>
{% endblock %}
