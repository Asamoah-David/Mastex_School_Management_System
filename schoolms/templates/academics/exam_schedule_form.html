{% extends "base.html" %}
{% block title %}Schedule Exam - {{ school.name }}{% endblock %}
{% block page_title %}Schedule Exam{% endblock %}
{% block page_subtitle %}Add exam to timetable{% endblock %}

{% block content %}
<div class="content-card">
    <form method="post">
        {% csrf_token %}
        <div class="form-group" style="margin-bottom:1rem;">
            <label>Term</label>
            <select name="term" required style="padding:0.5rem;">
                <option value="">-- Select --</option>
                {% for t in terms %}
                <option value="{{ t.id }}">{{ t.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group" style="margin-bottom:1rem;">
            <label>Subject</label>
            <select name="subject" required style="padding:0.5rem;">
                <option value="">-- Select --</option>
                {% for s in subjects %}
                <option value="{{ s.id }}">{{ s.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group" style="margin-bottom:1rem;">
            <label>Class / Group</label>
            <select name="class_name" style="padding:0.5rem;">
                <option value="">All classes</option>
                {% for c in classes %}
                <option value="{{ c }}">{{ c }}</option>
                {% endfor %}
                <option value="SHS 1">SHS 1</option>
                <option value="SHS 2">SHS 2</option>
                <option value="SHS 3">SHS 3</option>
            </select>
        </div>
        <div class="form-group" style="margin-bottom:1rem;">
            <label>Exam Date</label>
            <input type="date" name="exam_date" required style="padding:0.5rem;">
        </div>
        <div class="form-group" style="margin-bottom:1rem;">
            <label>Start Time (optional)</label>
            <input type="time" name="start_time" style="padding:0.5rem;">
        </div>
        <div class="form-group" style="margin-bottom:1rem;">
            <label>End Time (optional)</label>
            <input type="time" name="end_time" style="padding:0.5rem;">
        </div>
        <div class="form-group" style="margin-bottom:1rem;">
            <label>Room</label>
            <input type="text" name="room" maxlength="50" style="padding:0.5rem;">
        </div>
        <div class="form-group" style="margin-bottom:1rem;">
            <label>Notes</label>
            <textarea name="notes" rows="2" style="width:100%;padding:0.5rem;"></textarea>
        </div>
        <div class="button-row">
            <button type="submit" class="btn btn-primary">Schedule</button>
        </div>
    </form>
</div>
{% endblock %}
