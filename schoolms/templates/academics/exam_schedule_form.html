{% extends "base.html" %}
{% block title %}Schedule Exam - {{ school.name }}{% endblock %}
{% block page_title %}Schedule Exam{% endblock %}
{% block page_subtitle %}Add exam to timetable{% endblock %}

{% block content %}
<div class="content-card">
    <form method="post">
        {% csrf_token %}
        <div class="form-group" style="margin-bottom:1rem;">
            <label for="term">Term</label>
            <select id="term" name="term" required title="Select the academic term" style="padding:0.5rem;">
                <option value="">-- Select --</option>
                {% for t in terms %}
                <option value="{{ t.id }}">{{ t.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group" style="margin-bottom:1rem;">
            <label for="subject">Subject</label>
            <select id="subject" name="subject" required title="Select the subject" style="padding:0.5rem;">
                <option value="">-- Select --</option>
                {% for s in subjects %}
                <option value="{{ s.id }}">{{ s.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group" style="margin-bottom:1rem;">
            <label for="class_name">Class / Group</label>
            <select id="class_name" name="class_name" title="Select the class or group" style="padding:0.5rem;">
                <option value="">All classes</option>
                {% for c in classes %}
                <option value="{{ c }}">{{ c }}</option>
                {% endfor %}
                <option value="SHS 1">SHS 1</option>
                <option value="SHS 2">SHS 2</option>
                <option value="SHS 3">SHS 3</option>
            </select>
        </div>
        <div class="form-group" style="margin-bottom:1rem;">
            <label for="exam_date">Exam Date</label>
            <input type="date" id="exam_date" name="exam_date" required title="Enter the exam date" style="padding:0.5rem;">
        </div>
        <div class="form-group" style="margin-bottom:1rem;">
            <label for="start_time">Start Time (optional)</label>
            <input type="time" id="start_time" name="start_time" title="Enter the start time" style="padding:0.5rem;">
        </div>
        <div class="form-group" style="margin-bottom:1rem;">
            <label for="end_time">End Time (optional)</label>
            <input type="time" id="end_time" name="end_time" title="Enter the end time" style="padding:0.5rem;">
        </div>
        <div class="form-group" style="margin-bottom:1rem;">
            <label for="room">Room</label>
            <input type="text" id="room" name="room" maxlength="50" title="Enter the room number" style="padding:0.5rem;">
        </div>
        <div class="form-group" style="margin-bottom:1rem;">
            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" rows="2" title="Enter any additional notes" style="width:100%;padding:0.5rem;"></textarea>
        </div>
        <div class="button-row">
            <button type="submit" class="btn btn-primary">Schedule</button>
        </div>
    </form>
</div>
{% endblock %}
