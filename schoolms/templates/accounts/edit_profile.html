{% extends "base.html" %}
{% block title %}Edit Profile · Mastex SchoolOS{% endblock %}
{% block page_title %}Edit Profile{% endblock %}
{% block page_subtitle %}Update your personal details.{% endblock %}
{% block content %}
<form method="post" class="card" style="max-width: 720px;">
    {% csrf_token %}
    <div class="form-grid">
        <div class="form-group">
            <label for="id_first_name">First name</label>
            <input id="id_first_name" name="first_name" type="text" class="form-control" value="{{ user.first_name|default:'' }}">
        </div>
        <div class="form-group">
            <label for="id_last_name">Last name</label>
            <input id="id_last_name" name="last_name" type="text" class="form-control" value="{{ user.last_name|default:'' }}">
        </div>
        <div class="form-group full-width">
            <label for="id_email">Email</label>
            <input id="id_email" name="email" type="email" class="form-control" value="{{ user.email|default:'' }}">
        </div>
        <div class="form-group full-width">
            <label for="id_phone">Phone</label>
            <input id="id_phone" name="phone" type="text" class="form-control" value="{{ user.phone|default:'' }}">
        </div>
    </div>
    <div class="button-row mt-sm">
        <button type="submit" class="btn btn-primary">Save changes</button>
        <a href="{% url 'accounts:profile' %}" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
