{% extends "base.html" %}

{% block title %}Add Parent · MastexEDU{% endblock %}
{% block page_title %}Add Parent{% endblock %}
{% block page_subtitle %}Create a new parent account for {{ school.name }}{% endblock %}

{% block content %}
<form method="post">
    {% csrf_token %}
    <div class="content-card">
        <div class="form-grid-2">
            <div class="form-group">
                <label for="id_first_name">First Name</label>
                <input id="id_first_name" name="first_name" type="text" required />
            </div>
            <div class="form-group">
                <label for="id_last_name">Last Name</label>
                <input id="id_last_name" name="last_name" type="text" required />
            </div>
        </div>
        
        <div class="form-group mt-1">
            <label for="id_parent_type">Parent Type</label>
            <select id="id_parent_type" name="parent_type">
                <option value="">Select parent type</option>
                <option value="father">Father</option>
                <option value="mother">Mother</option>
                <option value="guardian">Guardian</option>
                <option value="other">Other</option>
            </select>
        </div>
        
        <div class="form-group mt-1">
            <label for="id_email">Email</label>
            <input id="id_email" name="email" type="email" />
        </div>
        
        <div class="form-group mt-1">
            <label for="id_phone">Phone</label>
            <input id="id_phone" name="phone" type="text" />
        </div>
        
        <div class="form-group mt-1">
            <label for="id_username">Username *</label>
            <input id="id_username" name="username" type="text" required />
        </div>
        
        <div class="form-group mt-1">
            <label for="id_password">Password *</label>
            <input id="id_password" name="password" type="password" required />
        </div>
    </div>
    
    <div class="button-row mt-sm">
        <button type="submit" class="btn btn-primary">Create Parent</button>
    </div>
</form>
<script>
(function() {
  const API = "{% url 'accounts:api_check_identifier' %}";
  function bind(id, kind, minLen) {
    const el = document.getElementById(id);
    if (!el) return;
    let t;
    const hint = document.createElement("div");
    hint.style.fontSize = "0.75rem";
    hint.style.marginTop = "0.25rem";
    hint.style.color = "var(--text-soft, #94a3b8)";
    el.closest(".form-group").appendChild(hint);
    el.addEventListener("input", function() {
      clearTimeout(t);
      const v = el.value.trim();
      hint.textContent = "";
      if (!v || v.length < (minLen || 2)) return;
      if (kind === "email" && v.length < 3) return;
      t = setTimeout(async function() {
        try {
          const u = API + "?kind=" + encodeURIComponent(kind) + "&value=" + encodeURIComponent(v);
          const r = await fetch(u, {headers: {"X-Requested-With": "XMLHttpRequest"}});
          const d = await r.json();
          if (d.available === true) { hint.style.color = "#22c55e"; hint.textContent = d.message || "OK"; }
          else if (d.available === false) { hint.style.color = "#f87171"; hint.textContent = d.message || "In use"; }
        } catch (e) {}
      }, 350);
    });
  }
  bind("id_username", "username", 2);
  bind("id_email", "email", 3);
  bind("id_phone", "phone", 2);
})();
</script>
{% endblock %}
