{% extends "base.html" %}
{% block title %}Register staff · MastexEDU{% endblock %}
{% block page_title %}Register new staff{% endblock %}
{% block page_subtitle %}Add a teacher or school administrator.{% endblock %}
{% block content %}
<form method="post">
    {% csrf_token %}
    <div class="content-grid" style="grid-template-columns: 1fr 1fr; max-width: 560px;">
        <div class="form-group">
            <label for="id_username">Username *</label>
            <input id="id_username" name="username" type="text" required class="form-input" />
        </div>
        <div class="form-group">
            <label for="id_email">Email *</label>
            <input id="id_email" name="email" type="email" required class="form-input" />
        </div>
        <div class="form-group">
            <label for="id_first_name">First name</label>
            <input id="id_first_name" name="first_name" type="text" class="form-input" />
        </div>
        <div class="form-group">
            <label for="id_last_name">Last name</label>
            <input id="id_last_name" name="last_name" type="text" class="form-input" />
        </div>
        <div class="form-group">
            <label for="id_password">Password *</label>
            <input id="id_password" name="password" type="password" required class="form-input" />
        </div>
        <div class="form-group">
            <label for="id_role">Role *</label>
            <select id="id_role" name="role" class="form-input">
                <option value="teacher">Teacher</option>
                <option value="school_admin">School Admin</option>
            </select>
        </div>
        <div class="form-group">
            <label for="id_phone">Phone</label>
            <input id="id_phone" name="phone" type="text" class="form-input" />
        </div>
    </div>
    <div class="button-row mt-sm">
        <button type="submit" class="btn btn-primary">Register staff</button>
    </div>
</form>
<script>
(function() {
  const API = "{% url 'accounts:api_check_identifier' %}";
  function bind(id, kind) {
    const el = document.getElementById(id);
    if (!el) return;
    let t;
    const hint = document.createElement("div");
    hint.style.fontSize = "0.75rem";
    hint.style.marginTop = "0.25rem";
    el.closest(".form-group").appendChild(hint);
    el.addEventListener("input", function() {
      clearTimeout(t);
      const v = el.value.trim();
      hint.textContent = "";
      if (!v || (kind === "email" && v.length < 3)) return;
      t = setTimeout(async function() {
        try {
          const u = API + "?kind=" + encodeURIComponent(kind) + "&value=" + encodeURIComponent(v);
          const r = await fetch(u, {headers: {"X-Requested-With": "XMLHttpRequest"}});
          const d = await r.json();
          if (d.available === true) { hint.style.color = "#22c55e"; hint.textContent = d.message || "OK"; }
          else if (d.available === false) { hint.style.color = "#f87171"; hint.textContent = d.message || "In use"; }
        } catch (e) {}
      }, 350);
    });
  }
  bind("id_username", "username");
  bind("id_email", "email");
})();
</script>
<style>.form-input { width: 100%; padding: 0.5rem 0.6rem; border-radius: 0.5rem; border: 1px solid rgba(148,163,184,0.5); background: rgba(15,23,42,0.9); color: var(--text-main); } .form-group { margin-bottom: 0.75rem; } .form-group label { display: block; font-size: 0.8rem; color: var(--text-soft); margin-bottom: 0.25rem; }</style>
<script>
(function() {
  const API = "{% url 'accounts:api_check_identifier' %}";
  function bind(id, kind, minLen) {
    const el = document.getElementById(id);
    if (!el) return;
    let t;
    const hint = document.createElement("div");
    hint.style.fontSize = "0.75rem";
    hint.style.marginTop = "0.25rem";
    el.closest(".form-group").appendChild(hint);
    el.addEventListener("input", function() {
      clearTimeout(t);
      const v = el.value.trim();
      hint.textContent = "";
      if (!v || v.length < (minLen || 2)) return;
      if (kind === "email" && v.length < 3) return;
      t = setTimeout(async function() {
        try {
          const u = API + "?kind=" + encodeURIComponent(kind) + "&value=" + encodeURIComponent(v);
          const r = await fetch(u, {headers: {"X-Requested-With": "XMLHttpRequest"}});
          const d = await r.json();
          if (d.available === true) { hint.style.color = "#22c55e"; hint.textContent = d.message || "OK"; }
          else if (d.available === false) { hint.style.color = "#f87171"; hint.textContent = d.message || "In use"; }
        } catch (e) {}
      }, 350);
    });
  }
  bind("id_username", "username", 2);
  bind("id_email", "email", 3);
  bind("id_phone", "phone", 2);
})();
</script>
{% endblock %}
