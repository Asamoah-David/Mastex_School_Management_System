<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#22c55e">
    <meta name="robots" content="noindex">
    <title>Page not found · Mastex SchoolOS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            font-family: "Plus Jakarta Sans", system-ui, sans-serif;
            background:
                radial-gradient(ellipse 95% 65% at 100% -25%, rgba(34, 197, 94, 0.12), transparent 52%),
                radial-gradient(ellipse 70% 45% at -10% 35%, rgba(59, 130, 246, 0.08), transparent 48%),
                #020617;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .panel {
            max-width: 28rem;
            width: 100%;
            padding: 2rem 1.75rem;
            border-radius: 1rem;
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid rgba(148, 163, 184, 0.35);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
            text-align: center;
        }
        .mark {
            width: 3rem;
            height: 3rem;
            margin: 0 auto 1rem;
            border-radius: 0.85rem;
            background: radial-gradient(circle at 20% 0, #4ade80 0, #22c55e 40%, #16a34a 70%, #0f766e 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #022c22;
            font-size: 0.95rem;
        }
        .code {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: #38bdf8;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        h1 { font-size: 1.15rem; font-weight: 650; margin-bottom: 0.5rem; }
        p { font-size: 0.9rem; color: #94a3b8; line-height: 1.55; margin-bottom: 1.25rem; }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 0.25rem;
        }
        a.btn {
            display: inline-block;
            padding: 0.55rem 1.25rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
            color: #022c22;
            background: linear-gradient(135deg, #4ade80, #22c55e);
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.35);
        }
        a.btn:hover { filter: brightness(1.05); }
        a.btn-secondary {
            color: #e2e8f0;
            background: transparent;
            border: 1px solid rgba(148, 163, 184, 0.45);
            box-shadow: none;
        }
        a.btn-secondary:hover {
            background: rgba(148, 163, 184, 0.12);
            filter: none;
        }
        .sub { margin-top: 1rem; font-size: 0.75rem; color: #64748b; }
    </style>
</head>
<body>
    <div class="panel">
        <div class="mark">MS</div>
        <div class="code">404</div>
        <h1>Page not found</h1>
        <p>The link may be wrong, outdated, or the page was moved. Use the buttons below to continue in Mastex SchoolOS.</p>
        <div class="actions">
            <a href="/" class="btn">Home</a>
            <a href="/accounts/login/" class="btn btn-secondary">Sign in</a>
        </div>
        <p style="font-size: 0.8rem; margin-bottom: 0.75rem;">School staff</p>
        <div class="actions">
            <a href="/accounts/school-dashboard/" class="btn btn-secondary">School dashboard</a>
            <a href="/accounts/dashboard/" class="btn btn-secondary">Platform dashboard</a>
        </div>
        <p class="sub">Mastex SchoolOS</p>
    </div>
</body>
</html>
