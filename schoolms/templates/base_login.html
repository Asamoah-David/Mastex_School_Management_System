<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'favicon.png' %}">
    <link rel="apple-touch-icon" href="{% static 'favicon.png' %}">
    <meta name="theme-color" content="#22c55e">
    <title>{% block title %}Sign in · Mastex SchoolOS{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <style>
        * { box-sizing: border-box; }
        /* Splash Screen / Preloader Styles */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top, #1e293b 0, #020617 45%, #020617 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out, visibility 0.5s ease-out;
        }
        .splash-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }
        .splash-logo {
            width: 72px;
            height: 72px;
            border-radius: 1.2rem;
            background: radial-gradient(circle at 20% 0, #4ade80 0, #22c55e 35%, #16a34a 55%, #0f766e 85%);
            box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.3), 0 16px 38px rgba(34, 197, 94, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #022c22;
            font-size: 1.5rem;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .splash-text {
            margin-top: 1.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: #e5e7eb;
            letter-spacing: 0.05em;
        }
        .splash-subtext {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: #6b7280;
        }
        .splash-spinner {
            width: 40px;
            height: 40px;
            margin-top: 1.5rem;
            border: 3px solid rgba(34, 197, 94, 0.2);
            border-top-color: #22c55e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #1e293b 0, #020617 45%, #020617 100%);
            color: #e5e7eb;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        body.splash-active {
            display: none;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border-radius: 1rem;
            background: radial-gradient(circle at 0 0, rgba(148, 163, 184, 0.12) 0, rgba(15, 23, 42, 0.98) 45%);
            border: 1px solid rgba(148, 163, 184, 0.35);
            padding: 1.75rem;
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.85);
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInUp 0.5s ease-out 0.3s forwards;
        }
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .brand-mark {
            width: 42px;
            height: 42px;
            border-radius: 0.9rem;
            background: radial-gradient(circle at 20% 0, #4ade80 0, #22c55e 35%, #16a34a 55%, #0f766e 85%);
            box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.3), 0 16px 38px rgba(34, 197, 94, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #022c22;
            font-size: 1rem;
        }
        .brand-title { font-size: 1.25rem; font-weight: 650; }
        .brand-subtitle { font-size: 0.8rem; color: #6b7280; margin-top: 0.15rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #9ca3af;
            margin-bottom: 0.35rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border-radius: 0.55rem;
            border: 1px solid rgba(148, 163, 184, 0.5);
            background: rgba(15, 23, 42, 0.9);
            color: #e5e7eb;
            font-size: 0.95rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
        }
        .btn {
            width: 100%;
            padding: 0.65rem 1rem;
            border-radius: 0.55rem;
            border: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #022c22;
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 14px 30px rgba(34, 197, 94, 0.4);
        }
        .messages { margin-bottom: 1rem; }
        .message-box {
            padding: 0.5rem;
            border-radius: 0.5rem;
            background: rgba(249, 115, 115, 0.15);
            color: #f97373;
            font-size: 0.85rem;
        }
        .message-box.success {
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
        }
        .errorlist { color: #f97373; font-size: 0.85rem; margin: 0 0 0.5rem; padding: 0; list-style: none; }
    </style>
</head>
<body>
    <!-- Splash Screen / Preloader -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-logo">MS</div>
        <div class="splash-text">Mastex SchoolOS</div>
        <div class="splash-subtext">Loading your experience...</div>
        <div class="splash-spinner"></div>
    </div>
    
    <div class="login-card">
        <div class="brand">
            <div class="brand-mark">MS</div>
            <div>
                <div class="brand-title">Mastex SchoolOS</div>
                <div class="brand-subtitle">School management platform</div>
            </div>
        </div>
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message-box {% if message.tags == 'success' %}success{% endif %}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    
    <script>
        // Splash Screen with Form Submission Support
        (function() {
            var splashScreen = document.getElementById('splashScreen');
            if (!splashScreen) return;
            
            // Auto-hide on initial page load
            document.addEventListener('DOMContentLoaded', function() {
                setTimeout(function() {
                    splashScreen.classList.add('hidden');
                }, 1200);
            });
            
            // Show splash during form submission
            var loginForm = document.querySelector('form');
            if (loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    var submitBtn = loginForm.querySelector('[type="submit"]');
                    var btnText = submitBtn ? (submitBtn.textContent.trim() || submitBtn.value || 'Signing in') : 'Signing in...';
                    
                    // Show splash immediately
                    splashScreen.classList.remove('hidden');
                    splashScreen.style.opacity = '1';
                    splashScreen.style.visibility = 'visible';
                    
                    // Update message
                    var subtext = splashScreen.querySelector('.splash-subtext');
                    if (subtext) subtext.textContent = btnText;
                });
            }
        })();
    </script>
</body>
</html>
