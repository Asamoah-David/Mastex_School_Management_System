{% extends "base.html" %}
{% block title %}Register student · Mastex SchoolOS{% endblock %}
{% block page_title %}Register new student{% endblock %}
{% block page_subtitle %}Enroll a student at {{ school.name }}.{% endblock %}
{% block content %}
<form method="post">
    {% csrf_token %}
    <div class="content-grid" style="grid-template-columns: 1fr 1fr; max-width: 560px;">
        <div class="form-group">
            <label for="id_username">Username *</label>
            <input id="id_username" name="username" type="text" required class="form-input" />
        </div>
        <div class="form-group">
            <label for="id_admission_number">Admission number *</label>
            <input id="id_admission_number" name="admission_number" type="text" required class="form-input" />
        </div>
        <div class="form-group">
            <label for="id_email">Email</label>
            <input id="id_email" name="email" type="email" class="form-input" />
        </div>
        <div class="form-group">
            <label for="id_class_name">Class</label>
            <input id="id_class_name" name="class_name" type="text" placeholder="e.g. Primary 3A" class="form-input" />
        </div>
        <div class="form-group">
            <label for="id_first_name">First name</label>
            <input id="id_first_name" name="first_name" type="text" class="form-input" />
        </div>
        <div class="form-group">
            <label for="id_last_name">Last name</label>
            <input id="id_last_name" name="last_name" type="text" class="form-input" />
        </div>
        <div class="form-group">
            <label for="id_password">Password *</label>
            <input id="id_password" name="password" type="password" required class="form-input" />
        </div>
        <div class="form-group">
            <label for="id_parent">Parent (optional)</label>
            <select id="id_parent" name="parent" class="form-input">
                <option value="">— None —</option>
                {% for p in parents %}
                <option value="{{ p.id }}">{{ p.get_full_name|default:p.username }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    <div class="button-row mt-sm">
        <button type="submit" class="btn btn-primary">Register student</button>
    </div>
</form>
<style>.form-input { width: 100%; padding: 0.5rem 0.6rem; border-radius: 0.5rem; border: 1px solid rgba(148,163,184,0.5); background: rgba(15,23,42,0.9); color: var(--text-main); } .form-group { margin-bottom: 0.75rem; } .form-group label { display: block; font-size: 0.8rem; color: var(--text-soft); margin-bottom: 0.25rem; }</style>
{% endblock %}
