{% extends "base.html" %}
{% block title %}Add Class - {{ school.name }}{% endblock %}
{% block page_title %}Add Class{% endblock %}
{% block page_subtitle %}Create a new class/section{% endblock %}

{% block content %}
<div class="content-card">
    <form method="post">
        {% csrf_token %}
        <div class="form-group" style="margin-bottom:1rem;">
            <label>Class Name</label>
            <input type="text" name="name" required placeholder="e.g. Form 1A" style="width:100%;padding:0.5rem;">
        </div>
        <div class="form-group" style="margin-bottom:1rem;">
            <label>Capacity</label>
            <input type="number" name="capacity" value="40" min="1" style="padding:0.5rem;">
        </div>
        <div class="form-group" style="margin-bottom:1rem;">
            <label>Class Teacher (optional)</label>
            <select name="class_teacher" style="padding:0.5rem;">
                <option value="">-- None --</option>
                {% for t in teachers %}
                <option value="{{ t.id }}">{{ t.get_full_name|default:t.username }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="button-row">
            <button type="submit" class="btn btn-primary">Create</button>
            <a href="{% url 'students:class_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
