{% extends 'base.html' %}
{% load static %}

{% block title %}{{ form_title|default:'Add Bus Route' }} - {{ school.name }}{% endblock %}

{% block content %}
<div class="content-card">
    <div class="page-heading">
        <div>
            <a href="{% url 'operations:bus_list' %}" class="btn btn-secondary btn-sm">&larr; Back to Bus Routes</a>
            <h2 class="section-title" style="margin-top:0.75rem;">{{ form_title|default:'Add Bus Route' }}</h2>
        </div>
    </div>

    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_name">Route Name <span style="color:#f87171;">*</span></label>
            <input type="text" name="name" id="id_name" required class="form-control" placeholder="e.g., Route A - East Side">
        </div>
        <div class="form-group">
            <label for="id_fee_per_term">Fee Amount <span style="color:#f87171;">*</span></label>
            <input type="number" name="fee_per_term" id="id_fee_per_term" step="0.01" min="0" required class="form-control" placeholder="0.00">
        </div>
        <div class="form-group">
            <label for="id_payment_frequency">Payment Frequency <span style="color:#f87171;">*</span></label>
            <select name="payment_frequency" id="id_payment_frequency" class="form-control">
                <option value="term">Per Term</option>
                <option value="daily">Daily</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">{{ submit_text|default:'Save Route' }}</button>
            <a href="{% url 'operations:bus_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
