{% extends "base.html" %}
{% block title %}Add Hostel Fee · Mastex SchoolOS{% endblock %}
{% block page_title %}Add Hostel Fee{% endblock %}
{% block page_subtitle %}Create a hostel fee record.{% endblock %}
{% block content %}

<form method="post" class="card" style="max-width: 820px;">
    {% csrf_token %}
    <div class="form-grid">
        <div class="form-group full-width">
            <label for="id_student">Student *</label>
            <select id="id_student" name="student" class="form-control" required>
                <option value="">Select student</option>
                {% for s in students %}
                <option value="{{ s.id }}">{{ s.user.get_full_name|default:s.user.username }} · {{ s.admission_number }} · {{ s.class_name|default:"—" }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group full-width">
            <label for="id_hostel">Hostel *</label>
            <select id="id_hostel" name="hostel" class="form-control" required>
                <option value="">Select hostel</option>
                {% for h in hostels %}
                <option value="{{ h.id }}">{{ h.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="id_term">Term *</label>
            <input id="id_term" name="term" class="form-control" placeholder="e.g. Term 1 2026" required>
        </div>
        <div class="form-group">
            <label for="id_amount">Amount (GHS) *</label>
            <input id="id_amount" name="amount" type="number" step="0.01" class="form-control" required>
        </div>
    </div>
    <div class="button-row mt-sm">
        <button class="btn btn-primary" type="submit">Save fee</button>
        <a class="btn btn-secondary" href="{% url 'operations:hostel_fees' %}">Cancel</a>
    </div>
</form>

{% endblock %}
