{% extends "base.html" %}
{% load static %}
{% block title %}{{ title }} - ID Card{% endblock %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="content-card">
    <h2>🪪 {{ title }}</h2>
    
    <form method="POST" enctype="multipart/form-data" class="form-styled">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="student">Student *</label>
            <select name="student" id="student" required class="form-control">
                <option value="">Select Student</option>
                {% for student in students %}
                <option value="{{ student.id }}" {% if student.id == form.student.value %}selected{% endif %}>
                    {{ student.user.get_full_name }} ({{ student.admission_number }})
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="card_number">Card Number *</label>
            <input type="text" name="card_number" id="card_number" required value="{{ form.card_number.value|default:'' }}" placeholder="e.g., STU-2025-001" class="form-control">
        </div>
        
        <div class="form-group">
            <label for="photo">Student Photo</label>
            <input type="file" name="photo" id="photo" accept="image/*" class="form-control">
            <small class="form-text text-muted">Upload a passport-size photo (JPG, PNG)</small>
        </div>
        
        <div class="form-group">
            <label for="issue_date">Issue Date *</label>
            <input type="date" name="issue_date" id="issue_date" required value="{{ form.issue_date.value|default:'' }}" class="form-control">
        </div>
        
        <div class="form-group">
            <label for="expiry_date">Expiry Date</label>
            <input type="date" name="expiry_date" id="expiry_date" value="{{ form.expiry_date.value|default:'' }}" class="form-control">
        </div>
        
        <div class="form-group">
            <label>
                <input type="checkbox" name="is_active" {% if form.is_active.value %}checked{% endif %}>
                Active Card
            </label>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">💾 Save</button>
            <a href="{% url 'operations:id_card_list' %}" class="btn btn-secondary">↩️ Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
