{% extends "base.html" %}
{% block title %}Add Book · Mastex SchoolOS{% endblock %}
{% block page_title %}Add / Update Book{% endblock %}
{% block page_subtitle %}Maintain the library catalog.{% endblock %}
{% block content %}

<form method="post" class="card" style="max-width: 820px;">
    {% csrf_token %}
    <div class="form-grid">
        <div class="form-group">
            <label for="id_isbn">ISBN *</label>
            <input id="id_isbn" name="isbn" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="id_total_copies">Total copies *</label>
            <input id="id_total_copies" name="total_copies" type="number" min="1" value="1" class="form-control" required>
        </div>
        <div class="form-group full-width">
            <label for="id_title">Title *</label>
            <input id="id_title" name="title" class="form-control" required>
        </div>
        <div class="form-group full-width">
            <label for="id_author">Author *</label>
            <input id="id_author" name="author" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="id_publisher">Publisher</label>
            <input id="id_publisher" name="publisher" class="form-control">
        </div>
        <div class="form-group">
            <label for="id_category">Category</label>
            <input id="id_category" name="category" class="form-control" placeholder="Fiction, Science...">
        </div>
        <div class="form-group full-width">
            <label for="id_shelf_location">Shelf location</label>
            <input id="id_shelf_location" name="shelf_location" class="form-control" placeholder="A-12">
        </div>
    </div>
    <div class="button-row mt-sm">
        <button class="btn btn-primary" type="submit">Save book</button>
        <a class="btn btn-secondary" href="{% url 'operations:library_manage' %}">Cancel</a>
    </div>
</form>

{% endblock %}
