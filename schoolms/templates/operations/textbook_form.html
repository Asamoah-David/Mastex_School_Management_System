{% extends "base.html" %}
{% block title %}Add Textbook · Mastex SchoolOS{% endblock %}
{% block page_title %}Add Textbook{% endblock %}
{% block page_subtitle %}{{ school.name }}{% endblock %}
{% block content %}
<form method="post" class="form-card">
    {% csrf_token %}
    <div class="form-group">
        <label for="title">Title</label>
        <input type="text" name="title" id="title" required class="form-control" placeholder="e.g., Mathematics for Primary 6">
    </div>
    <div class="form-group">
        <label for="price">Price (GHS)</label>
        <input type="number" name="price" id="price" required class="form-control" step="0.01" min="0" placeholder="e.g., 25.00">
    </div>
    <div class="form-group">
        <label for="stock">Stock Quantity</label>
        <input type="number" name="stock" id="stock" class="form-control" min="0" value="0" placeholder="e.g., 100">
    </div>
    <div class="form-group">
        <label for="isbn">ISBN (optional)</label>
        <input type="text" name="isbn" id="isbn" class="form-control" placeholder="e.g., 978-3-16-148410-0">
    </div>
    <div class="button-row">
        <button type="submit" class="btn btn-primary">Create Textbook</button>
        <a href="{% url 'operations:textbook_list' %}" class="btn btn-secondary">Cancel</a>
    </div>
</form>

<style>
.form-card {
    max-width: 500px;
    background: rgba(15, 23, 42, 0.8);
    border: 1px solid rgba(148, 163, 184, 0.2);
    border-radius: 0.75rem;
    padding: 2rem;
}
.form-group {
    margin-bottom: 1.5rem;
}
.form-group label {
    display: block;
    margin-bottom: 0.5rem;
    color: #e5e7eb;
    font-weight: 500;
}
.form-control {
    width: 100%;
    padding: 0.75rem;
    border: 1px solid rgba(148, 163, 184, 0.3);
    border-radius: 0.5rem;
    background: rgba(30, 41, 59, 0.8);
    color: #e5e7eb;
    font-size: 1rem;
}
.form-control:focus {
    outline: none;
    border-color: #22c55e;
    box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
}
</style>
{% endblock %}
