{% extends 'base.html' %}
{% load static %}

{% block title %}{{ form_title|default:'Request Leave' }} - {{ school.name }}{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="mb-6">
            <a href="{% url 'operations:staff_leave_list' %}" class="text-blue-600 hover:text-blue-800 mb-4 inline-flex items-center">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                Back to Leave Requests
            </a>
            <h1 class="text-2xl font-bold text-gray-900">{{ form_title|default:'Request Leave' }}</h1>
        </div>

        <!-- Form Card -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <form method="post" class="space-y-6">
                {% csrf_token %}
                
                <!-- Leave Type -->
                <div>
                    <label for="id_leave_type" class="block text-sm font-medium text-gray-700 mb-1">Leave Type *</label>
                    <select name="leave_type" id="id_leave_type" required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        <option value="">Select Leave Type</option>
                        <option value="sick">Sick Leave</option>
                        <option value="annual">Annual Leave</option>
                        <option value="personal">Personal Leave</option>
                        <option value="emergency">Emergency Leave</option>
                        <option value="maternity">Maternity Leave</option>
                        <option value="paternity">Paternity Leave</option>
                        <option value="study">Study Leave</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <!-- Start Date -->
                <div>
                    <label for="id_start_date" class="block text-sm font-medium text-gray-700 mb-1">Start Date *</label>
                    <input type="date" name="start_date" id="id_start_date" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <!-- End Date -->
                <div>
                    <label for="id_end_date" class="block text-sm font-medium text-gray-700 mb-1">End Date *</label>
                    <input type="date" name="end_date" id="id_end_date" required
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>

                <!-- Reason -->
                <div>
                    <label for="id_reason" class="block text-sm font-medium text-gray-700 mb-1">Reason *</label>
                    <textarea name="reason" id="id_reason" rows="4" required
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                              placeholder="Provide a brief reason for your leave request..."></textarea>
                </div>

                <!-- Covering Teacher (Optional) -->
                <div>
                    <label for="id_covering_teacher" class="block text-sm font-medium text-gray-700 mb-1">Covering Teacher (Optional)</label>
                    <input type="text" name="covering_teacher" id="id_covering_teacher"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="Name of teacher covering your classes">
                </div>

                <!-- Contact During Leave -->
                <div>
                    <label for="id_contact_during_leave" class="block text-sm font-medium text-gray-700 mb-1">Contact During Leave (Optional)</label>
                    <input type="text" name="contact_during_leave" id="id_contact_during_leave"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="Phone number or email for emergencies">
                </div>

                <!-- Submit Button -->
                <div class="flex justify-end space-x-3 pt-4 border-t">
                    <a href="{% url 'operations:staff_leave_list' %}"
                       class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
                        Cancel
                    </a>
                    <button type="submit"
                            class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                        {{ submit_text|default:'Submit Request' }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
