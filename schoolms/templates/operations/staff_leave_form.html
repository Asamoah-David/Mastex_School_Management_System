{% extends "base.html" %}
{% block title %}Request leave · {{ school.name }}{% endblock %}
{% block page_title %}Request leave{% endblock %}
{% block page_subtitle %}Submit dates and reason. Leadership will approve or reject.{% endblock %}
{% block content %}
<div class="content-card" style="max-width:640px;">
    <form method="post">
        {% csrf_token %}
        <div class="form-grid">
            <div class="form-group full-width">
                <label for="id_leave_type">Leave type</label>
                <select id="id_leave_type" name="leave_type" class="form-control">
                    <option value="">Select type</option>
                    <option value="sick">Sick leave</option>
                    <option value="annual">Annual leave</option>
                    <option value="personal">Personal leave</option>
                    <option value="emergency">Emergency</option>
                    <option value="maternity">Maternity</option>
                    <option value="paternity">Paternity</option>
                    <option value="study">Study leave</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div class="form-group">
                <label for="id_start_date">Start date *</label>
                <input type="date" id="id_start_date" name="start_date" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="id_end_date">End date *</label>
                <input type="date" id="id_end_date" name="end_date" class="form-control" required>
            </div>
            <div class="form-group full-width">
                <label for="id_reason">Reason *</label>
                <textarea id="id_reason" name="reason" class="form-control" rows="4" required placeholder="Brief explanation"></textarea>
            </div>
            <div class="form-group full-width">
                <label for="id_covering_teacher">Covering staff (optional)</label>
                <input type="text" id="id_covering_teacher" name="covering_teacher" class="form-control" placeholder="Name of person covering classes or duties">
            </div>
            <div class="form-group full-width">
                <label for="id_contact_during_leave">Contact during leave (optional)</label>
                <input type="text" id="id_contact_during_leave" name="contact_during_leave" class="form-control" placeholder="Phone or email for emergencies">
            </div>
        </div>
        <div class="button-row mt-sm">
            <button type="submit" class="btn btn-primary">Submit request</button>
            <a href="{% url 'operations:staff_leave_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
