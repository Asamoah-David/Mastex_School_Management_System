{% extends "base.html" %}

{% block title %}{% if object %}Edit Calendar Event{% else %}Create Calendar Event{% endif %}{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2>{% if object %}Edit Calendar Event{% else %}Create Calendar Event{% endif %}</h2>
    
    <form method="post" class="mt-4">
        {% csrf_token %}
        
        <div class="mb-3">
            <label for="title" class="form-label">Title *</label>
            <input type="text" name="title" id="title" class="form-control" value="{{ object.title|default:'' }}" required>
        </div>
        
        <div class="mb-3">
            <label for="event_type" class="form-label">Event Type *</label>
            <select name="event_type" id="event_type" class="form-control" required>
                <option value="">Select Event Type</option>
                <option value="term_start" {% if object.event_type == 'term_start' %}selected{% endif %}>Term Start</option>
                <option value="term_end" {% if object.event_type == 'term_end' %}selected{% endif %}>Term End</option>
                <option value="exam_start" {% if object.event_type == 'exam_start' %}selected{% endif %}>Exams Start</option>
                <option value="exam_end" {% if object.event_type == 'exam_end' %}selected{% endif %}>Exams End</option>
                <option value="holiday" {% if object.event_type == 'holiday' %}selected{% endif %}>Holiday</option>
                <option value="event" {% if object.event_type == 'event' %}selected{% endif %}>School Event</option>
            </select>
        </div>
        
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="start_date" class="form-label">Start Date *</label>
                <input type="date" name="start_date" id="start_date" class="form-control" value="{{ object.start_date|default:'' }}" required>
            </div>
            
            <div class="col-md-6 mb-3">
                <label for="end_date" class="form-label">End Date</label>
                <input type="date" name="end_date" id="end_date" class="form-control" value="{{ object.end_date|default:'' }}">
            </div>
        </div>
        
        <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea name="description" id="description" class="form-control" rows="4">{{ object.description|default:'' }}</textarea>
        </div>
        
        <div class="mt-4">
            <button type="submit" class="btn btn-primary">Save Event</button>
            <a href="{% url 'operations:calendar_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
