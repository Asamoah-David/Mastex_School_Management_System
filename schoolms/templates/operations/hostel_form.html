{% extends "base.html" %}
{% block title %}Add Hostel · Mastex SchoolOS{% endblock %}
{% block page_title %}Add Hostel{% endblock %}
{% block page_subtitle %}Create a new hostel/dormitory.{% endblock %}
{% block content %}

<form method="post" class="card" style="max-width: 820px;">
    {% csrf_token %}
    <div class="form-grid">
        <div class="form-group full-width">
            <label for="id_name">Name *</label>
            <input id="id_name" name="name" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="id_type">Type *</label>
            <select id="id_type" name="type" class="form-control" required>
                <option value="">Select</option>
                <option value="Boys">Boys</option>
                <option value="Girls">Girls</option>
                <option value="Mixed">Mixed</option>
            </select>
        </div>
        <div class="form-group">
            <label for="id_total_beds">Total beds</label>
            <input id="id_total_beds" name="total_beds" type="number" min="0" value="50" class="form-control">
        </div>
        <div class="form-group">
            <label for="id_fee_per_term">Fee per term (GHS)</label>
            <input id="id_fee_per_term" name="fee_per_term" type="number" step="0.01" value="0" class="form-control">
        </div>
        <div class="form-group">
            <label for="id_warden_name">Warden name</label>
            <input id="id_warden_name" name="warden_name" class="form-control">
        </div>
        <div class="form-group">
            <label for="id_warden_phone">Warden phone</label>
            <input id="id_warden_phone" name="warden_phone" class="form-control">
        </div>
    </div>
    <div class="button-row mt-sm">
        <button class="btn btn-primary" type="submit">Save</button>
        <a class="btn btn-secondary" href="{% url 'operations:hostel_list' %}">Cancel</a>
    </div>
</form>

{% endblock %}
