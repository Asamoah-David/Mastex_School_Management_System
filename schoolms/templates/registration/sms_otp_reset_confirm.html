{% extends "base_public.html" %}
{% block title %}Enter OTP – Reset Password{% endblock %}
{% block content %}
<div class="auth-card" style="max-width:420px;margin:4rem auto;">
    <h2 style="margin-bottom:1rem;">🔐 Enter OTP &amp; New Password</h2>
    {% if messages %}{% for msg in messages %}<div class="alert alert-{{ msg.tags }}">{{ msg }}</div>{% endfor %}{% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="form-group" style="margin-bottom:1rem;">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" class="form-control" placeholder="+233XXXXXXXXX" required autofocus>
        </div>
        <div class="form-group" style="margin-bottom:1rem;">
            <label for="otp">6-digit OTP</label>
            <input type="text" id="otp" name="otp" class="form-control" maxlength="6" inputmode="numeric" placeholder="123456" required>
        </div>
        <div class="form-group" style="margin-bottom:1rem;">
            <label for="password1">New Password</label>
            <input type="password" id="password1" name="password1" class="form-control" required>
        </div>
        <div class="form-group" style="margin-bottom:1.5rem;">
            <label for="password2">Confirm Password</label>
            <input type="password" id="password2" name="password2" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;">Reset Password</button>
    </form>
    <p style="margin-top:1.5rem;text-align:center;font-size:0.85rem;">
        <a href="{% url 'accounts:sms_otp_reset_request' %}">← Request new OTP</a> &nbsp;|&nbsp;
        <a href="{% url 'accounts:login' %}">Back to login</a>
    </p>
</div>
{% endblock %}
