{% extends "base_login.html" %}
{% load static %}

{% block title %}Password Reset Complete · Mastex SchoolOS{% endblock %}

{% block content %}
<div style="text-align: center; padding: 1rem 0;">
    <div style="font-size: 3rem; margin-bottom: 1rem;">✅</div>
    <h2 style="margin-bottom: 1rem; font-size: 1.25rem;">Password reset successful</h2>
    <p style="margin-bottom: 1.5rem; font-size: 0.9rem; color: #9ca3af;">
        Your password has been reset. You can now log in with your new password.
    </p>
    <a href="{% url 'accounts:login' %}" class="btn btn-primary" style="display: inline-block; width: auto; padding: 0.65rem 1.5rem; text-decoration: none;">
        Log in
    </a>
</div>
{% endblock %}
