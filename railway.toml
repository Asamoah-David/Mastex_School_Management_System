[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Run migrations in pre-deploy so the web process can bind HTTP immediately for healthchecks.
# The entrypoint runs with `web-only` to skip the inline migration step.
preDeployCommand = "python manage.py migrate --noinput"
startCommand = "./docker-entrypoint.sh web-only"
healthcheckPath = "/health/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "web"

[[services]]
# Celery worker — comment out if Redis is not provisioned
name = "worker"
startCommand = "celery -A schoolms worker -l info --concurrency 2"

[[services]]
# Celery beat — comment out if Redis is not provisioned
name = "beat"
startCommand = "celery -A schoolms beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler"
