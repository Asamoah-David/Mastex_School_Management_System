# Render Blueprint
services:
  - type: web
    name: schoolms
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/
    preDeployCommand: python manage.py migrate --noinput && python manage.py createcachetable 2>/dev/null; true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DEBUG
        value: "False"
