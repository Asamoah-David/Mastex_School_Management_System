# Continuous integration — must stay green for Railway "Wait for CI".
# Fixes applied for common failures:
# - Use python3 before setup-python (ubuntu-latest often has no `python` alias).
# - SQLite DB (no Postgres service = no port/race flakes).
# - cancel-in-progress: false — cancelled runs can block Railway as "check suite failed".

name: CI

on:
  push:
    branches: [main, master, production, staging]
  pull_request:
    branches: [main, master, production, staging]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  django:
    name: django
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key-not-for-production-use-only-xxxxxxxx
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      # File URL: four slashes = absolute path /tmp/... (dj-database-url / Django)
      DATABASE_URL: sqlite:////tmp/schoolms_ci.sqlite3
      CSRF_TRUSTED_ORIGINS: http://127.0.0.1:8000
      SENTRY_DSN: ""
      BEHIND_TLS_TERMINATING_PROXY: "true"
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Django system check (deployment)
        run: python manage.py check --deploy

      # Fails if models changed without committed migrations (common Railway blocker).
      - name: No missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Create cache table (optional)
        run: python manage.py createcachetable 2>/dev/null || true

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Preflight (same checks you should run before go-live)
        run: python manage.py preflight

      - name: Django tests (full suite)
        run: python manage.py test --verbosity 1

      # Same interpreter/venv as manage.py test (avoids flaky second-job installs on runners).
      - name: HTTP smoke tests (pytest e2e_tests)
        run: |
          python -m pip install "pytest>=8.0,<9" "pytest-django>=4.8,<5"
          python -m pytest e2e_tests -v --tb=short

  # Legacy check name only: smoke tests run above inside "django". Keeps Railway / branch rules
  # that still require a green "e2e-playwright" status without a second pytest install.
  e2e-playwright:
    name: e2e-playwright
    runs-on: ubuntu-latest
    needs: django
    steps:
      - name: OK
        run: echo "Smoke tests ran in django job."
