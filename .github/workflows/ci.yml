# Continuous integration: lint-equivalent checks, migrations, static files.
# Railway "Wait for CI" skips deploys if any workflow job fails — keep this green.
# Extend with pytest when tests are added to the repository.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  django:
    name: django
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: schoolms_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SECRET_KEY: ci-secret-key-not-for-production-use-only-xxxxxxxx
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/schoolms_ci
      CSRF_TRUSTED_ORIGINS: http://127.0.0.1:8000
      SENTRY_DSN: ""
      # Match production (TLS at edge) so deploy checks match Railway/Render.
      BEHIND_TLS_TERMINATING_PROXY: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for PostgreSQL
        run: |
          python - <<'PY'
          import socket, time
          deadline = time.time() + 60
          while time.time() < deadline:
              try:
                  s = socket.create_connection(("127.0.0.1", 5432), timeout=2)
                  s.close()
                  print("postgres accepting connections")
                  break
              except OSError:
                  time.sleep(1)
          else:
              raise SystemExit("PostgreSQL not reachable on 127.0.0.1:5432")
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Django system check (deployment)
        run: python manage.py check --deploy

      - name: No missing migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Apply migrations
        run: python manage.py migrate --noinput

      - name: Create cache table (matches production entrypoint)
        run: python manage.py createcachetable 2>/dev/null || true

      - name: Collect static files
        run: python manage.py collectstatic --noinput

      - name: Tests
        run: python manage.py test finance.tests --verbosity 1

    # Docker image is built by Railway from Dockerfile; duplicate CI builds often
    # flake (BuildKit, caches, runner limits) and caused "CI check suite failed"
    # deploy skips. Validate app via django job above instead.
