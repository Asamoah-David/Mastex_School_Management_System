version: "3.9"

services:
  web:
    build: .
    command: sh -c "python manage.py migrate && gunicorn schoolms.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: schoolms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
